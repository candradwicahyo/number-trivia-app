<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.4.9/sweetalert2.min.css">
  <title>trivia app</title>
</head>
<body class="bg-primary">

  <div class="container my-3">
    <div class="row">
      <div class="col-md-8 mx-auto">

        <div class="bg-gray p-4 rounded">
          <h1 class="fw-normal">Number Trivia App</h1>
          <p class="fw-light">
            Lorem ipsum dolor sit amet, consectetur adipisicing elit. Corporis a laborum quo, corrupti officia molestias at tenetur veniam cum veritatis, distinctio, maiores.
          </p>
          <span class="fw-light mt-4">enter number between 0 to 300</span>
        </div>
        
        <div class="bg-white p-4 rounded my-3">
          <div class="wrapper">
            <input type="number" class="input-custom input" placeholder="enter a number between 0 to 300" autocomplete="off">
            <button class="button btn btn-outline-primary rounded-1 mx-1 submit">Get Fact</button>
          </div>
          <div class="box-content">
            <h5 class="number"></h5>
            <p class="text"></p>
          </div>
          <button class="btn btn-outline-primary random rounded-1 w-100">Get Random Fact</button>
        </div>
        
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.4.9/sweetalert2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
